<div class="form-container" [formGroup]="enrollForm">
  <h2>Reactive Enrollment Form</h2>

  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Student Name</label>
      <input type="text" formControlName="studentName" />
      <span *ngIf="enrollForm.get('studentName')?.errors?.['required'] && enrollForm.get('studentName')?.touched" class="error">
        Name is required
      </span>
      <span *ngIf="enrollForm.get('studentName')?.errors?.['minlength'] && enrollForm.get('studentName')?.touched" class="error">
        Name must be at least 3 characters
      </span>
    </div>

    <div class="form-group">
      <label>Student Email</label>
      <input type="email" formControlName="studentEmail" />
      <span *ngIf="enrollForm.get('studentEmail')?.errors?.['required'] && enrollForm.get('studentEmail')?.touched" class="error">
        Email is required
      </span>
      <span *ngIf="enrollForm.get('studentEmail')?.errors?.['email'] && enrollForm.get('studentEmail')?.touched" class="error">
        Please enter a valid email
      </span>
      <span *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']" class="error">
        Email already taken
      </span>
    </div>

    <div class="form-group">
      <label>Course ID</label>
      <input type="text" formControlName="courseId" />
      <span *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']" class="error">
        Course code starting with XX is not allowed.
      </span>
      <span *ngIf="enrollForm.get('courseId')?.errors?.['required'] && enrollForm.get('courseId')?.touched" class="error">
        Course ID is required
      </span>
    </div>

    <div class="form-group">
      <label>Preferred Semester</label>
      <select formControlName="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" formControlName="agreeToTerms" />
        I agree to the terms and conditions
      </label>
    </div>

    <div formArrayName="additionalCourses" class="form-group">
      <label>Additional Courses</label>
      <div *ngFor="let ctrl of additionalCourses.controls; let i = index">
        <input [formControlName]="i" placeholder="Course code" />
        <button type="button" (click)="removeCourse(i)" class="btn-remove">Remove</button>
      </div>
      <button type="button" (click)="addCourse()" class="btn-add">Add Another Course</button>
    </div>

    <div class="actions">
      <button type="submit" [disabled]="enrollForm.invalid" class="btn-primary">
        Submit
      </button>
    </div>
  </form>

  <a routerLink="/courses" class="back-link">&larr; Back to Courses</a>
</div>
