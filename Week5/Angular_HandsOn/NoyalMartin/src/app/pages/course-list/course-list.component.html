<div class="course-list-container">
  <h2>Available Courses</h2>

  <input
    type="text"
    [(ngModel)]="searchTerm"
    (ngModelChange)="onSearchChange($event)"
    placeholder="Search courses..."
    class="search-input"
  />

  <!-- Loading state -->
  <p *ngIf="isLoading">Loading courses...</p>

  <!-- Empty state with else template -->
  <ng-template #noCourses>
    <p>No courses available.</p>
  </ng-template>

  <div *ngIf="!isLoading && (courses$ | async) as courses;">
    <div *ngIf="courses.length > 0; else noCourses">
      <app-course-card
        *ngFor="let course of courses; trackBy: trackByCourseId"
        [course]="course"
        (enrollRequested)="onEnroll($event)"
      ></app-course-card>
    </div>
  </div>

  <p *ngIf="selectedCourseId" class="selected-info">
    Selected course ID: {{ selectedCourseId }}
  </p>
</div>
