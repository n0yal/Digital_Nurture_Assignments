<div class="form-container">
  <h2>Enrollment Request</h2>

  <div *ngIf="submitted" class="success-message">
    Enrollment request submitted successfully!
  </div>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">
    <div class="form-group">
      <label>Student Name</label>
      <input
        type="text"
        name="studentName"
        [(ngModel)]="studentName"
        #nameCtrl="ngModel"
        required
        minlength="3"
        placeholder="Enter your name"
      />
      <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']" class="error">
        Name is required
      </span>
      <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']" class="error">
        Name must be at least 3 characters
      </span>
    </div>

    <div class="form-group">
      <label>Student Email</label>
      <input
        type="email"
        name="studentEmail"
        [(ngModel)]="studentEmail"
        #emailCtrl="ngModel"
        required
        email
        placeholder="you@example.com"
      />
      <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']" class="error">
        Email is required
      </span>
      <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']" class="error">
        Please enter a valid email
      </span>
    </div>

    <div class="form-group">
      <label>Course ID</label>
      <input
        type="number"
        name="courseId"
        [(ngModel)]="courseId"
        #courseCtrl="ngModel"
        required
        placeholder="e.g. 1"
      />
      <span *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']" class="error">
        Course ID is required
      </span>
    </div>

    <div class="form-group">
      <label>Preferred Semester</label>
      <select
        name="preferredSemester"
        [(ngModel)]="preferredSemester"
        required
      >
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <div class="form-group">
      <label>
        <input
          type="checkbox"
          name="agreeToTerms"
          [(ngModel)]="agreeToTerms"
          required
        />
        I agree to the terms and conditions
      </label>
    </div>

    <div class="actions">
      <button type="submit" [disabled]="enrollForm.invalid" class="btn-primary">
        Submit
      </button>
      <button type="button" (click)="onReset(enrollForm)" class="btn-secondary">
        Reset
      </button>
    </div>
  </form>

  <a routerLink="/courses" class="back-link">&larr; Back to Courses</a>
</div>
